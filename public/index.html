<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control</title>
  <script>
    (function(){
      var t = localStorage.getItem('mc_token');
      if (!t) { window.location.replace('/login.html'); return; }
      fetch('/api/auth/check', { headers: { 'Authorization': 'Bearer ' + t } })
        .then(function(r) { if (!r.ok) { localStorage.removeItem('mc_token'); window.location.replace('/login.html'); } })
        .catch(function() { /* offline/local — continue */ });
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="var(--accent)" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="var(--accent)" opacity="0.3"/><circle cx="12" cy="12" r="1.5" fill="var(--accent)"/><line x1="12" y1="2" x2="12" y2="6" stroke="var(--accent)" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="22" stroke="var(--accent)" stroke-width="1.5"/><line x1="2" y1="12" x2="6" y2="12" stroke="var(--accent)" stroke-width="1.5"/><line x1="18" y1="12" x2="22" y2="12" stroke="var(--accent)" stroke-width="1.5"/></svg>
        <span class="logo-text">Mission Control</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <ul class="nav-links">
      <li class="nav-section-label">Overview</li>
      <li><a href="#" data-page="dashboard" class="nav-link active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a></li>
      <li><a href="#" data-page="projects" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Projects</span>
      </a></li>

      <li class="nav-section-label">OpenClaw</li>
      <li><a href="#" data-page="chat" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </a></li>
      <li><a href="#" data-page="queue" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Queue</span>
      </a></li>
      <li><a href="#" data-page="agent" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Agent Status</span>
      </a></li>

      <li class="nav-section-label">Content</li>
      <li><a href="#" data-page="notes" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Dev Diary</span>
      </a></li>
      <li><a href="#" data-page="uploads" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Uploads</span>
      </a></li>

      <li class="nav-section-label">System</li>
      <li><a href="#" data-page="settings" class="nav-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="agent-status">
        <div class="status-dot online"></div>
        <span>OpenClaw Agent: Online</span>
      </div>
      <div class="llm-status" style="margin-top:8px;display:flex;align-items:center;gap:4px;color:var(--text-muted);font-size:.78rem;">
        <div class="status-dot" id="llmDot" style="width:8px;height:8px;background:#555;border-radius:50%;"></div>
        <span id="llmLabel">LLM: loading…</span>
      </div>
      <button onclick="logout()" style="width:100%;background:transparent;border:1px solid var(--border-muted,#30363d);border-radius:6px;color:var(--text-muted,#8b949e);font-size:.78rem;padding:7px 12px;cursor:pointer;margin-top:8px;transition:border-color .15s,color .15s" onmouseover="this.style.color='var(--danger,#f85149)';this.style.borderColor='var(--danger,#f85149)'" onmouseout="this.style.color='var(--text-muted,#8b949e)';this.style.borderColor='var(--border-muted,#30363d)'">
        Sign out
      </button>

    </div>
  </nav>

  <!-- Main content -->
  <div class="main-wrapper" id="mainWrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <span class="page-subtitle" id="pageSubtitle">Welcome back, Shadow</span>
      </div>
      <div class="topbar-right">
        <div class="clock" id="clock"></div>
        <button class="btn btn-icon" onclick="refreshPage()" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button class="btn btn-icon mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')" title="Menu" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </header>
    <main class="content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="btn btn-icon" onclick="closeModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-btn active" id="mnav-dashboard" onclick="mobileNav('dashboard')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Home
    </button>
    <button class="mobile-nav-btn" id="mnav-projects" onclick="mobileNav('projects')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Projects
    </button>
    <button class="mobile-nav-btn" id="mnav-chat" onclick="mobileNav('chat')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </button>
    <button class="mobile-nav-btn" id="mnav-queue" onclick="mobileNav('queue')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Queue
    </button>
    <button class="mobile-nav-btn" id="mnav-more" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      More
    </button>
  </nav>

  <script src="/js/markdown.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/components/dashboard.js"></script>
  <script src="/js/components/projects.js"></script>
  <script src="/js/components/chat.js"></script>
  <script src="/js/components/tasks.js"></script>
  <script src="/js/components/queue.js"></script>
  <script src="/js/components/agent.js"></script>
  <script src="/js/components/notes.js"></script>
  <script src="/js/components/uploads.js"></script>
  <script src="/js/components/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
