<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --danger: #f85149;
      --radius: 8px;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 10px;
    }
    .logo h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.3px;
    }
    .logo p {
      font-size: .82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: .82rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: .9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,.12);
    }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .error {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: var(--radius);
      color: var(--danger);
      font-size: .82rem;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: .75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🚀</span>
      <h1>Mission Control</h1>
      <p>Shadow's dev dashboard</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autofocus autocomplete="current-password">
      </div>
      <button type="submit" id="submitBtn">Sign in</button>
      <div class="error" id="errorMsg"></div>
    </form>

    <div class="footer">Mission Control · Local AI Dashboard</div>
  </div>

  <script>
    // Already logged in? Redirect
    if (localStorage.getItem('mc_token')) {
      window.location.replace('/');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('mc_token', data.token);
        window.location.replace('/');
      } catch(err) {
        errEl.textContent = '❌ ' + err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
